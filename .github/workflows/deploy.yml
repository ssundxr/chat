name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: ./ghost
        run: npm install
      
      - name: Build project
        working-directory: ./ghost
        run: npm run build
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_PRIVATE_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
          
          # Copy files to EC2
          ssh $EC2_USER@$EC2_HOST "mkdir -p ~/black-mamba-server/dist ~/black-mamba-server/web"
          rsync -avz --delete ghost/dist/ $EC2_USER@$EC2_HOST:~/black-mamba-server/dist/
          rsync -avz --delete ghost/web/ $EC2_USER@$EC2_HOST:~/black-mamba-server/web/
          rsync -avz ghost/package.json ghost/package-lock.json \
            $EC2_USER@$EC2_HOST:~/black-mamba-server/
          
          # Restart service on EC2
          ssh $EC2_USER@$EC2_HOST \
            "cd ~/black-mamba-server && npm install --production && sudo systemctl restart black-mamba"
